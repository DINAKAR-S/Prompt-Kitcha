name: Build PromptKitcha

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  build-macos-aarch64:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - name: Install dependencies
        run: npm ci
      - name: Build Tauri
        run: npm run tauri build
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: PromptKitcha-macos-aarch64
          path: src-tauri/target/release/bundle/dmg/PromptKitcha_*.dmg

  build-macos-x86:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - name: Install dependencies
        run: npm ci
      - name: Build Tauri
        run: npm run tauri build
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: PromptKitcha-macos-x86
          path: src-tauri/target/release/bundle/dmg/PromptKitcha_*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: npm ci
      - name: Build Tauri
        run: npm run tauri build
      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: PromptKitcha-windows
          path: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - name: Install dependencies
        run: npm ci
      - name: Build Tauri
        run: npm run tauri build
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: PromptKitcha-linux
          path: src-tauri/target/release/bundle/**/*.AppImage